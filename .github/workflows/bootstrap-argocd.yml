name: Bootstrap Argo CD

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: pod10-dev-eks-cluster

jobs:
  install-and-register-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Install Argo CD
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --version 7.7.16 \
            -f module-eks/argocd-values.yaml \
            --wait --timeout 10m

      - name: Apply ClusterIssuer
        continue-on-error: true
        run: kubectl apply -f ClusterIssuer.yaml

      - name: Register bank-app Application
        run: |
          kubectl apply -f k8s/argocd/application-bank-app.yaml
          kubectl wait --for=condition=Ready pods -l app.kubernetes.io/name=argocd-server -n argocd --timeout=300s

      - name: Trigger initial sync
        run: |
          kubectl patch application pod10-bank-app -n argocd --type merge \
            -p '{"operation":{"initiatedBy":{"username":"github-actions"},"sync":{"revision":"main"}}}' 2>/dev/null || true
          sleep 10
          kubectl get application pod10-bank-app -n argocd
