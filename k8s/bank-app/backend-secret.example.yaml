# Copy to backend-secret.yaml, fill values, apply once (do not commit backend-secret.yaml)
# kubectl create secret generic bank-backend-secret -n bank-app \
#   --from-literal=DB_USERNAME='your_user' \
#   --from-literal=DB_PASSWORD='your_password' \
#   --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: bank-backend-secret
  namespace: bank-app
type: Opaque
stringData:
  DB_USERNAME: "REPLACE_ME"
  DB_PASSWORD: "REPLACE_ME"
