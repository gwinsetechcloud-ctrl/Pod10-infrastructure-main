server:
  extraArgs:
    - --insecure

  ingress:
    enabled: true
    ingressClassName: external-nginx
    hosts:
      - argocd.pod13fintech.online
    tls:
      - secretName: argocd-pod13fintech-online
        hosts:
          - argocd.pod13fintech.online

configs:
  params:
    server.insecure: true

# How to get ArgoCD admin password after deployment:
# kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d